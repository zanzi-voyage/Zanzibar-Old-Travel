<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zanzibar Old Travel</title>

<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body{
  margin: 0;
  padding: 0;
}

/* HERO */
.hero{
  width: 100%;
  height: 100vh;
  background-image: url("https://images.unsplash.com/photo-1586500036706-41963de24d8b?q=80");
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* overlay */
.hero::before{
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
}

.hero-content{
  position: relative;
  color: white;
  text-align: center;
}
</style>

</head>

<body>

<section class="hero">
  <div class="hero-content">
    <h1>Zanzibar Old Travel</h1>
    <p>Discover Zanzibar beauty</p>
  </div>
</section>












  <style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  scroll-behavior: smooth;
}

/* NAVBAR STICKY */
.navbar{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: rgba(0,0,0,0.75);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  z-index: 9999;
}

/* LOGO */
.logo{
  color: white;
  font-size: 22px;
  font-weight: bold;
}

/* MENU ICON */
.menu-icon{
  font-size: 28px;
  color: white;
  cursor: pointer;
}

/* DROPDOWN MENU */
.nav-links{
  position: absolute;
  top: 60px;
  right: 20px;
  background: rgba(0,0,0,0.95);
  width: 200px;
  display: none;
  flex-direction: column;
  border-radius: 8px;
}

.nav-links a{
  color: white;
  padding: 12px;
  text-decoration: none;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}

.nav-links a:hover{
  background: #00bcd4;
}

/* HERO */
.hero{
  height: 100vh;
  background: url("https://images.unsplash.com/photo-1528127269322-539801943592?auto=format&fit=crop&w=1600&q=80");
  background-size: cover;
  background-position: center;
}

/* SECTIONS TEST */
section{
  height: 100vh;
  padding: 20px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">Zanzibar Old Travel</div>

  <div class="menu-icon" onclick="toggleMenu()">☰</div>

  <div class="nav-links" id="navLinks">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#tours">Tours</a>
    <a href="#contact">Contact</a>
  </div>
</div>

<!-- HERO -->
<section class="hero" id="home"></section>

<!-- OTHER SECTIONS -->
<section id="about">About Section</section>
<section id="tours">Tours Section</section>
<section id="contact">Contact Section</section>

<script>
function toggleMenu(){
  var menu = document.getElementById("navLinks");
  menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
}
</script>
