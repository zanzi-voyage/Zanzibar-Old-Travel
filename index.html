<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zanzibar Old Travel</title>

<style>
  *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body{
    font-family: Arial, sans-serif;
  }

  /* HERO SECTION */
  .hero{
    position: relative;
    width: 100%;
    height: 100vh; /* full screen */
    background-image: url("https://images.unsplash.com/photo-1500375592092-40eb2168fd21?auto=format&fit=crop&w=1600&q=80");
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* dark overlay */
  .hero::before{
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
  }

  /* content box */
  .hero-content{
    position: relative;
    text-align: center;
    color: white;
    padding: 20px;
    max-width: 800px;
  }

  .hero-content h1{
    font-size: 50px;
    margin-bottom: 15px;
  }

  .hero-content p{
    font-size: 18px;
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .hero-content a{
    display: inline-block;
    padding: 12px 25px;
    background: #00bcd4;
    color: white;
    text-decoration: none;
    border-radius: 5px;
  }

  .hero-content a:hover{
    background: #0097a7;
  }

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Zanzibar Old Travel</h1>
    <p>Discover the beauty of Zanzibar – beaches, history, and culture in one unforgettable journey.</p>
    <a href="#tours">Explore Tours</a>
  </div>
</section>

</body>
</html>
