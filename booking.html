
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Booking Form</title>

<style>

body{
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  padding:40px 20px;
}

/* CONTAINER */
.booking-box{
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* TITLE */
.booking-box h2{
  text-align: center;
  margin-bottom: 20px;
}

/* INPUTS */
.booking-box input,
.booking-box select,
.booking-box textarea{
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
}

/* BUTTON */
.booking-box button{
  width: 100%;
  padding: 14px;
  background: orange;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

.booking-box button:hover{
  background: darkorange;
}

</style>
</head>

<body>

<div class="booking-box">

  <h2>Book Your Tour</h2>

  <form action="https://api.web3forms.com/submit" method="POST">
<input type="hidden" name="access_key" value="03d55715-ad91-435b-bc06-d7239144910a">

    <input type="text" name="name" placeholder="Full Name" required>

    <input type="email" name="email" placeholder="Email Address" required>

<input type="text" name="country" placeholder="Your Country" required>
    
    <input type="text" name="phone" placeholder="Phone Number" required>

    

    <!-- PEOPLE -->
    <select name="people" required>
      <option value="">Number of People</option>
      <option>1 Person</option>
      <option>2 People</option>
      <option>3 People</option>
      <option>4 People</option>
      <option>5+ People</option>
    </select>

    <!-- DATE -->
    <input type="text" name="date" placeholder="Date to arrive" onfocus="(this.type='date')" required>

    <!-- MESSAGE -->
    <textarea name="message" placeholder="Extra Details"></textarea>

    <input type="hidden" name="_captcha" value="false">

    <button type="submit">Book Now</button>

  </form>

</div>

</body>
</html>
