<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Now</title>









  <style>
body{
  font-family: Arial;
  margin:0;
  background:#f5f5f5;
}

/* CONTAINER */
.booking{
  max-width: 500px;
  margin: 80px auto;
  background:#fff;
  padding:25px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.booking h2{
  text-align:center;
  margin-bottom:20px;
}

/* INPUTS */
.booking input,
.booking select,
.booking textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:14px;
}

/* BUTTON */
.booking button{
  width:100%;
  padding:12px;
  border:none;
  background:#ff7a00;
  color:#fff;
  font-size:16px;
  border-radius:8px;
  cursor:pointer;
}

.booking button:hover{
  background:#e66a00;
}
</style>
</head>

<body>

<div class="booking">
  <h2>Book Your Tour</h2>

  <input type="text" id="name" placeholder="Your Name" required>
  <input type="email" id="email" placeholder="Your Email" required>
  <input type="tel" id="phone" placeholder="Phone Number">

  <select id="tour">
    <option>Stone Town Tour</option>
    <option>Safari Blue</option>
    <option>Prison Island</option>
    <option>Spice Tour</option>
  </select>

  <input type="date" id="date">

  <textarea id="message" rows="4" placeholder="Extra details..."></textarea>

  <button onclick="sendBooking()">Book Now</button>
</div>

<script>
function sendBooking(){
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let phone = document.getElementById("phone").value;
  let tour = document.getElementById("tour").value;
  let date = document.getElementById("date").value;
  let message = document.getElementById("message").value;

  let text = `BOOKING REQUEST:
Name: ${name}
Email: ${email}
Phone: ${phone}
Tour: ${tour}
Date: ${date}
Message: ${message}`;

  // 🔥 WEKA NAMBA YAKO HAPA
  let whatsappNumber = "255678859687";

  let url = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(text)}`;

  window.open(url, "_blank");
}
</script>





<form action="https://formsubmit.co/kareemsalum2006@gmail.com" method="POST">

  <input type="text" name="name" placeholder="Your Name" required>
  <br><br>

  <input type="email" name="email" placeholder="Your Email" required>
  <br><br>

  <input type="text" name="phone" placeholder="Phone Number" required>
  <br><br>

  <input type="number" name="people" placeholder="Number of People" min="1" required>
  <br><br>

  <textarea name="message" placeholder="Your Booking Details" required></textarea>
  <br><br>

  <input type="hidden" name="_captcha" value="false">

  <button type="submit">Book Now</button>

</form>





  
</body>
</html>
